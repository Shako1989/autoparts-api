spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls.enable: true

server:
  forward-headers-strategy: framework

app:
  s3:
    endpoint: ${S3_ENDPOINT}
    region: ${S3_REGION:auto}
    access-key: ${S3_ACCESS_KEY}
    secret-key: ${S3_SECRET_KEY}
    bucket: ${S3_BUCKET:autoparts}
    listings-bucket: ${S3_LISTINGS_BUCKET}
    listings-public-base: ${S3_LISTINGS_PUBLIC_BASE}
    catalog-bucket: ${S3_CATALOG_BUCKET}
    catalog-public-base: ${S3_CATALOG_PUBLIC_BASE}
  jwt:
    secret: ${JWT_SECRET}
    issuer: ${JWT_ISSUER:autoparts-api}
    access-ttl: ${JWT_ACCESS_TTL:P1D}
  admin:
    phones: ${ADMIN_PHONES:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  otp:
    email:
      from: ${OTP_EMAIL_FROM:no-reply@autoparts.az}
      subject: ${OTP_EMAIL_SUBJECT:Your AutoParts.az verification code}

management:
  health:
    # Redis is on the classpath but unused in v1 — exclude from /actuator/health.
    redis:
      enabled: false
    # JavaMailSender's health check opens an SMTP connection on every probe,
    # which is wasteful (and Brevo may rate-limit). The send path errors loudly
    # on its own if SMTP is broken.
    mail:
      enabled: false

logging:
  level:
    root: INFO
    az.autoparts: INFO
